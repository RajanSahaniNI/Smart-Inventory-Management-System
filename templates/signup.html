{% extends 'base.html' %}
{% block title %}Sign Up{% endblock %}

{% block content %}

<div class="glass-card form-card transparent-auth-card fade-in" style="max-width: 350px; margin: 40px auto; text-align: center;">
    <div class="character-container slide-in" style="text-align: center; margin-bottom: 10px;">
        <svg id="animated-character" width="80" height="80" viewBox="0 -10 120 130" style="overflow: visible;">
            <style>
                .pupil {
                    transition: transform 0.1s ease-out;
                }
            </style>
            <!-- Box Body -->
            <rect x="25" y="30" width="70" height="70" rx="15" fill="var(--grapefruit-pink)" stroke="#fff" stroke-width="4" />
            <!-- Box Flaps -->
            <path d="M 25 30 L 60 10 L 95 30" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round" />
            <!-- Left Eye Background -->
            <circle cx="45" cy="60" r="10" fill="white" />
            <!-- Right Eye Background -->
            <circle cx="75" cy="60" r="10" fill="white" />
            <!-- Left Pupil -->
            <circle class="pupil" id="pupil-left" cx="45" cy="60" r="5" fill="#333" />
            <!-- Right Pupil -->
            <circle class="pupil" id="pupil-right" cx="75" cy="60" r="5" fill="#333" />
            <!-- Smile -->
            <path id="smile" d="M 50 80 Q 60 90 70 80" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" />
        </svg>
    </div>

    <h2 style="color: var(--grapefruit-pink); margin-bottom: 24px; text-shadow: 0 0 10px rgba(255, 104, 107, 0.4);">
        Signup</h2>

    <form action="{{ url_for('auth_bp.signup') }}" method="POST" class="styled-form text-left"
        style="text-align: left;">
        <div class="form-group slide-in delay-1">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="glass-input" required>
        </div>
        <div class="form-group slide-in delay-2">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="glass-input" required>
        </div>
        <div class="form-actions slide-in delay-3">
            <button type="submit" class="btn-primary btn-large w-100">Create Account</button>
        </div>
    </form>
    <p class="slide-in delay-4" style="margin-top: 24px; color: var(--text-muted);">
        Already registered? <a href="{{ url_for('auth_bp.login') }}"
            style="color: var(--pearl-aqua); text-decoration: underline;">Login Here</a>
    </p>
</div>

<script>
    document.addEventListener('mousemove', (e) => {
        const mouseX = e.clientX;
        const mouseY = e.clientY;
        
        const svg = document.getElementById('animated-character');
        if (!svg) return;
        
        const rect = svg.getBoundingClientRect();
        // center of the svg
        const svgX = rect.left + rect.width / 2;
        const svgY = rect.top + rect.height / 2;
        
        // Calculate angle and distance
        const dx = mouseX - svgX;
        const dy = mouseY - svgY;
        const angle = Math.atan2(dy, dx);
        
        // Limit the pupil movement distance (e.g., max 4px inside the eye)
        const maxDist = 4;
        const pupilX = Math.cos(angle) * maxDist;
        const pupilY = Math.sin(angle) * maxDist;
        
        document.getElementById('pupil-left').style.transform = `translate(${pupilX}px, ${pupilY}px)`;
        document.getElementById('pupil-right').style.transform = `translate(${pupilX}px, ${pupilY}px)`;
    });
</script>
{% endblock %}
